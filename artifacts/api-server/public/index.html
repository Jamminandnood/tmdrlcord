<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AC%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!-- Login modal -->
    <div id="loginOverlay" class="overlay">
      <div class="login-card">
        <div class="login-logo">RC</div>
        <h1>Realtime Chat</h1>
        <p class="login-sub">로그인하거나 익명으로 입장하세요.</p>

        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="login">
            로그인
          </button>
          <button type="button" class="auth-tab" data-tab="register">
            회원가입
          </button>
          <button type="button" class="auth-tab" data-tab="anon">
            익명
          </button>
        </div>

        <!-- Login -->
        <form id="loginForm" class="auth-pane active" data-pane="login">
          <input
            type="text"
            id="loginUsername"
            placeholder="닉네임"
            maxlength="20"
            autocomplete="username"
          />
          <input
            type="password"
            id="loginPassword"
            placeholder="비밀번호"
            maxlength="100"
            autocomplete="current-password"
          />
          <button type="submit" class="primary">로그인</button>
        </form>

        <!-- Register -->
        <form id="registerForm" class="auth-pane" data-pane="register">
          <input
            type="text"
            id="registerUsername"
            placeholder="닉네임 (2~20자, 글자/숫자/_-.)"
            maxlength="20"
            autocomplete="username"
          />
          <input
            type="password"
            id="registerPassword"
            placeholder="비밀번호 (4자 이상)"
            maxlength="100"
            autocomplete="new-password"
          />
          <input
            type="password"
            id="registerPasswordConfirm"
            placeholder="비밀번호 확인"
            maxlength="100"
            autocomplete="new-password"
          />
          <button type="submit" class="primary">회원가입 후 입장</button>
        </form>

        <!-- Anonymous -->
        <div class="auth-pane" data-pane="anon">
          <p class="anon-note">
            익명으로 입장하면 닉네임이 IP 주소를 기반으로 자동 생성돼요.
            <br />
            (예: 익명(203.0.113.42))
          </p>
          <button id="anonymousBtn" type="button" class="primary">
            익명으로 입장
          </button>
        </div>

        <div id="loginError" class="login-error"></div>
      </div>
    </div>

    <!-- Main app -->
    <div id="app" class="app hidden">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-logo">RC</div>
            <div class="brand-name">Realtime Chat</div>
          </div>
        </div>

        <div class="channel-section">
          <div class="section-title">채널</div>
          <div
            id="channelGlobal"
            class="channel-item active"
            data-channel="global"
          >
            <span class="hash">#</span>
            <span>전체 채팅방</span>
          </div>
        </div>

        <div class="channel-section users-section">
          <div class="section-title">
            온라인 — <span id="userCount">0</span>
          </div>
          <div id="userList" class="user-list"></div>
        </div>

        <div class="me-bar">
          <div class="me-avatar" id="meAvatar">?</div>
          <div class="me-info">
            <div class="me-nick" id="meNick">-</div>
            <div class="me-status">
              <span class="status-dot"></span> <span id="meStatus">온라인</span>
            </div>
          </div>
          <button id="logoutBtn" class="logout-btn" title="로그아웃">⏻</button>
        </div>
      </aside>

      <!-- Main chat area -->
      <main class="chat-area">
        <header class="chat-header">
          <div class="chat-title">
            <span id="chatTitleIcon" class="hash">#</span>
            <span id="chatTitle">전체 채팅방</span>
            <span id="chatSubtitle" class="chat-subtitle"></span>
          </div>
          <div class="chat-actions">
            <button
              id="silentToggle"
              class="action-btn"
              title="무음 모드: 알림 소리/진동 없이 표시"
            >
              <span class="dot"></span>
              무음 모드: <strong id="silentLabel">꺼짐</strong>
            </button>
            <button
              id="notifyToggle"
              class="action-btn"
              title="브라우저 알림 켜기/끄기"
            >
              <span class="dot"></span>
              알림: <strong id="notifyLabel">꺼짐</strong>
            </button>
            <button id="leaveDmBtn" class="action-btn hidden">
              ✕ DM 닫기
            </button>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <div id="typingIndicator" class="typing-indicator"></div>

        <div id="imagePreview" class="image-preview hidden">
          <img id="imagePreviewImg" alt="첨부 이미지 미리보기" />
          <div class="image-preview-meta">
            <span id="imagePreviewName"></span>
            <button type="button" id="imagePreviewRemove" class="ghost-icon">
              ✕
            </button>
          </div>
        </div>

        <form id="messageForm" class="composer">
          <button
            type="button"
            id="attachBtn"
            class="attach-btn"
            title="이미지 첨부 (PNG/JPG/GIF/WebP, 최대 10MB)"
          >
            📎
          </button>
          <input
            type="file"
            id="fileInput"
            accept="image/png,image/jpeg,image/gif,image/webp"
            hidden
          />
          <input
            type="text"
            id="messageInput"
            placeholder="메시지를 입력하세요..."
            autocomplete="off"
            maxlength="2000"
          />
          <button type="submit" class="send-btn">전송</button>
        </form>
      </main>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
    <script src="/app.js"></script>
  </body>
</html>
