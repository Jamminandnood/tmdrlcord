<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AC%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!-- Login modal -->
    <div id="loginOverlay" class="overlay">
      <div class="login-card">
        <div class="login-logo">RC</div>
        <h1>Realtime Chat</h1>
        <p class="login-sub">로그인하거나 익명으로 입장하세요.</p>

        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-tab="login">
            로그인
          </button>
          <button type="button" class="auth-tab" data-tab="register">
            회원가입
          </button>
          <button type="button" class="auth-tab" data-tab="anon">
            익명
          </button>
        </div>

        <form id="loginForm" class="auth-pane active" data-pane="login">
          <input
            type="text"
            id="loginUsername"
            placeholder="닉네임"
            maxlength="20"
            autocomplete="username"
          />
          <input
            type="password"
            id="loginPassword"
            placeholder="비밀번호"
            maxlength="100"
            autocomplete="current-password"
          />
          <button type="submit" class="primary">로그인</button>
        </form>

        <form id="registerForm" class="auth-pane" data-pane="register">
          <input
            type="text"
            id="registerUsername"
            placeholder="닉네임 (2~20자, 글자/숫자/_-.)"
            maxlength="20"
            autocomplete="username"
          />
          <input
            type="password"
            id="registerPassword"
            placeholder="비밀번호 (4자 이상)"
            maxlength="100"
            autocomplete="new-password"
          />
          <input
            type="password"
            id="registerPasswordConfirm"
            placeholder="비밀번호 확인"
            maxlength="100"
            autocomplete="new-password"
          />
          <button type="submit" class="primary">회원가입 후 입장</button>
        </form>

        <div class="auth-pane" data-pane="anon">
          <p class="anon-note">
            익명으로 입장하면 닉네임이 IP 주소를 기반으로 자동 생성돼요.
            <br />
            (예: 익명(203.0.113.42))
          </p>
          <button id="anonymousBtn" type="button" class="primary">
            익명으로 입장
          </button>
        </div>

        <div id="loginError" class="login-error"></div>
      </div>
    </div>

    <!-- Connection status banner -->
    <div id="connBanner" class="conn-banner hidden"></div>

    <!-- Main app -->
    <div id="app" class="app hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-logo">RC</div>
            <div class="brand-name">Realtime Chat</div>
          </div>
        </div>

        <div class="channel-section">
          <div class="section-title">
            채널
            <button
              id="addChannelBtn"
              class="section-btn hidden"
              title="채널 추가"
            >
              +
            </button>
          </div>
          <div id="channelList" class="channel-list"></div>
        </div>

        <div class="channel-section users-section">
          <div class="section-title">
            온라인 — <span id="userCount">0</span>
          </div>
          <div id="userList" class="user-list"></div>
          <div class="section-title section-title-sub">
            오프라인 — <span id="offlineCount">0</span>
          </div>
          <div id="offlineList" class="user-list"></div>
        </div>

        <div class="me-bar" id="meBar" title="클릭해서 프로필 편집">
          <div class="me-avatar" id="meAvatar">?</div>
          <div class="me-info">
            <div class="me-nick" id="meNick">-</div>
            <div class="me-status">
              <span class="status-dot"></span> <span id="meStatus">온라인</span>
            </div>
          </div>
          <button id="logoutBtn" class="logout-btn" title="로그아웃">⏻</button>
        </div>
      </aside>

      <main class="chat-area">
        <header class="chat-header">
          <div class="chat-title">
            <span id="chatTitleIcon" class="hash">#</span>
            <span id="chatTitle">전체 채팅방</span>
            <span id="chatSubtitle" class="chat-subtitle"></span>
          </div>
          <div class="chat-actions">
            <button
              id="manageMembersBtn"
              class="action-btn hidden"
              title="비공개 채널 멤버 관리"
            >
              👥 멤버
            </button>
            <button
              id="silentToggle"
              class="action-btn"
              title="무음 모드: 알림 소리/진동 없이 표시"
            >
              <span class="dot"></span>
              무음 모드: <strong id="silentLabel">꺼짐</strong>
            </button>
            <button
              id="notifyToggle"
              class="action-btn"
              title="브라우저 알림 켜기/끄기"
            >
              <span class="dot"></span>
              알림: <strong id="notifyLabel">꺼짐</strong>
            </button>
            <button id="leaveDmBtn" class="action-btn hidden">
              ✕ DM 닫기
            </button>
          </div>
        </header>

        <div id="messages" class="messages"></div>

        <div id="typingIndicator" class="typing-indicator"></div>

        <div id="muteBanner" class="mute-banner hidden"></div>

        <div id="imagePreview" class="image-preview hidden">
          <img id="imagePreviewImg" alt="첨부 이미지 미리보기" />
          <div class="image-preview-meta">
            <span id="imagePreviewName"></span>
            <button type="button" id="imagePreviewRemove" class="ghost-icon">
              ✕
            </button>
          </div>
        </div>

        <form id="messageForm" class="composer">
          <button
            type="button"
            id="attachBtn"
            class="attach-btn"
            title="이미지 첨부 (PNG/JPG/GIF/WebP, 최대 10MB) — Ctrl+V로 붙여넣기 가능"
          >
            📎
          </button>
          <input
            type="file"
            id="fileInput"
            accept="image/png,image/jpeg,image/gif,image/webp"
            hidden
          />
          <input
            type="text"
            id="messageInput"
            placeholder="메시지를 입력하세요... (Ctrl+V로 이미지 붙여넣기)"
            autocomplete="off"
            maxlength="2000"
          />
          <button type="submit" class="send-btn">전송</button>
        </form>
      </main>
    </div>

    <!-- User popover (click any user) -->
    <div id="userPopover" class="popover hidden">
      <div class="popover-header">
        <div class="popover-avatar" id="popoverAvatar">?</div>
        <div>
          <div class="popover-name" id="popoverName"></div>
          <div class="popover-status" id="popoverStatus"></div>
        </div>
        <button class="popover-close" id="popoverClose">✕</button>
      </div>
      <div class="popover-bio" id="popoverBio"></div>
      <div class="popover-actions" id="popoverActions"></div>
    </div>

    <!-- Profile editor modal -->
    <div id="profileModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>프로필 편집</h3>
        <div class="profile-avatar-section">
          <div class="profile-avatar-preview" id="profileAvatarPreview">?</div>
          <div class="profile-avatar-controls" id="profileAvatarControls">
            <input
              type="file"
              id="profileAvatarFile"
              accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
              hidden
            />
            <button type="button" class="ghost-btn" id="profileAvatarUpload">
              📷 이미지 업로드
            </button>
            <button
              type="button"
              class="ghost-btn"
              id="profileAvatarRemove"
            >
              제거
            </button>
            <div class="profile-avatar-hint" id="profileAvatarHint">
              PNG/JPG/GIF/WebP, 최대 10MB
            </div>
          </div>
        </div>
        <label>표시 이름
          <input type="text" id="profileDisplayName" maxlength="24" />
        </label>
        <label>프로필 카드 (소개)
          <textarea
            id="profileBio"
            maxlength="200"
            rows="3"
            placeholder="자신을 소개하는 한 줄을 적어보세요"
          ></textarea>
        </label>
        <label>아바타 배경색 (이미지가 없을 때 사용)
          <div class="color-row">
            <input type="color" id="profileColor" value="#5865f2" />
            <button type="button" class="ghost-btn" id="profileColorReset">
              자동
            </button>
          </div>
        </label>
        <div class="modal-error" id="profileError"></div>
        <div class="modal-actions">
          <button type="button" class="ghost-btn" id="profileCancel">취소</button>
          <button type="button" class="primary" id="profileSave">저장</button>
        </div>
      </div>
    </div>

    <!-- Create channel modal -->
    <div id="channelModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3 id="channelModalTitle">새 채널 만들기</h3>
        <label>채널 이름
          <input
            type="text"
            id="channelName"
            maxlength="30"
            placeholder="예: 공지, 친구방"
          />
        </label>
        <label>채널 종류
          <div class="radio-row">
            <label class="radio">
              <input
                type="radio"
                name="channelType"
                value="public"
                checked
              />
              공개 (모두 볼 수 있음)
            </label>
            <label class="radio">
              <input type="radio" name="channelType" value="private" />
              비공개 (허용한 사람만)
            </label>
          </div>
        </label>
        <label id="channelMembersLabel" class="hidden">허용할 멤버
          <div id="channelMembersList" class="members-list"></div>
        </label>
        <div class="modal-error" id="channelError"></div>
        <div class="modal-actions">
          <button type="button" class="ghost-btn" id="channelCancel">취소</button>
          <button type="button" class="primary" id="channelSave">만들기</button>
        </div>
      </div>
    </div>

    <!-- Manage private channel members modal -->
    <div id="membersModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>멤버 관리</h3>
        <p class="modal-sub" id="membersModalSub"></p>
        <div id="membersListEdit" class="members-list"></div>
        <div class="modal-error" id="membersError"></div>
        <div class="modal-actions">
          <button type="button" class="ghost-btn" id="membersCancel">취소</button>
          <button type="button" class="primary" id="membersSave">저장</button>
        </div>
      </div>
    </div>

    <!-- Admin force-rename modal -->
    <div id="renameModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>닉네임 강제 변경</h3>
        <p class="modal-sub" id="renameModalSub"></p>
        <input type="text" id="renameInput" maxlength="24" />
        <div class="modal-error" id="renameError"></div>
        <div class="modal-actions">
          <button type="button" class="ghost-btn" id="renameCancel">취소</button>
          <button type="button" class="primary" id="renameSave">변경</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO" crossorigin="anonymous"></script>
    <script src="/app.js"></script>
  </body>
</html>
