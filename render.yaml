services:
  - type: web
    name: realtime-chat
    runtime: node
    region: singapore
    plan: free
    rootDir: artifacts/api-server
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: chat-data
      mountPath: /opt/render/project/src/artifacts/api-server/.data
      sizeGB: 1
